<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>比特司令 - 掌控加密财富指挥权</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@900&family=Inter:wght@400;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap');
    
    body { background-color: #010302; }
    .font-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
    .font-inter { font-family: 'Inter', sans-serif; }
    .font-heavy { font-family: 'Lexend', 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-weight: 900; }

    .liquid-glass {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(25px);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 20px 50px rgba(0, 0, 0, 0.6);
      position: relative;
    }
    .liquid-glass::before {
      content: ""; position: absolute; inset: 0; padding: 1.5px; border-radius: inherit;
      background: linear-gradient(135deg, #5ed29c 0%, #00f2ff 50%, #7000ff 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; opacity: 0.5;
    }
    .scanline {
      width: 100%; height: 2px; position: absolute;
      background: linear-gradient(to right, transparent, rgba(94, 210, 156, 0.2), transparent);
      animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    .vertical-text { writing-mode: vertical-rl; }
    .heavy-text-shadow { text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  </style>
</head>

<body class="relative min-h-screen text-white overflow-hidden selection:bg-[#5ed29c] selection:text-[#010302]">

  <div class="absolute inset-0 z-0">
    <video id="bg-video" muted loop playsinline class="absolute inset-0 w-full h-full object-cover opacity-50 grayscale-[20%] contrast-[1.2] mix-blend-screen"></video>
    <div class="absolute inset-0 bg-gradient-to-r from-[#010302] via-[#010302]/60 to-transparent"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-[#010302] via-[#010302]/30 to-transparent"></div>
  </div>

  <div class="absolute inset-0 z-[1] pointer-events-none flex justify-end overflow-hidden">
    <div class="relative w-full md:w-[80%] lg:w-[60%] h-full mix-blend-screen opacity-50">
      <img src="image_4d994d.jpg" alt="Cyber Commander" class="absolute inset-0 w-full h-full object-cover object-center lg:object-right grayscale contrast-[1.5] brightness-110" />
      <div class="absolute inset-0 bg-[#5ed29c] mix-blend-color"></div>
      <div class="absolute inset-0 bg-gradient-to-r from-[#010302] via-[#010302]/60 to-transparent"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-[#010302] via-transparent to-transparent h-1/3 bottom-0 top-auto"></div>
      <div class="absolute inset-0 bg-gradient-to-b from-[#010302] via-transparent to-transparent h-1/3 top-0"></div>
    </div>
  </div>

  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-[1600px] h-[500px] pointer-events-none z-10 opacity-30">
    <svg viewBox="0 0 1000 400" class="w-full h-full">
      <ellipse cx="500" cy="0" rx="500" ry="150" fill="url(#sciFiGlow)" filter="blur(80px)" />
      <defs>
        <radialGradient id="sciFiGlow" cx="50%" cy="0%" r="100%">
          <stop offset="0%" stop-color="#5ed29c" /><stop offset="100%" stop-color="transparent" />
        </radialGradient>
      </defs>
    </svg>
  </div>

  <header class="absolute top-0 left-0 w-full z-50 p-6 md:p-10 md:px-16 flex justify-between items-center">
    <div class="flex items-center gap-4 group cursor-pointer">
      <div class="w-12 h-12 bg-[#5ed29c] rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(94,210,156,0.3)] transition-transform group-hover:scale-105">
        <i data-lucide="trending-up" class="text-[#010302] w-7 h-7 stroke-[3px]"></i>
      </div>
      <span class="font-heavy text-2xl tracking-tight uppercase">比特司令</span>
    </div>
    <nav class="hidden lg:flex items-center gap-12">
      <a href="#" class="font-heavy text-[13px] tracking-widest text-white/40 transition-all hover:text-white relative group">战略中心<span class="absolute -bottom-1 left-0 w-0 h-[2px] bg-[#5ed29c] transition-all group-hover:w-full"></span></a>
      <a href="#" class="font-heavy text-[13px] tracking-widest text-white/40 transition-all hover:text-white relative group">实时战报<span class="absolute -bottom-1 left-0 w-0 h-[2px] bg-[#5ed29c] transition-all group-hover:w-full"></span></a>
      <a href="#" class="font-heavy text-[13px] tracking-widest text-white/40 transition-all hover:text-white relative group">情报智库<span class="absolute -bottom-1 left-0 w-0 h-[2px] bg-[#5ed29c] transition-all group-hover:w-full"></span></a>
      <a href="#" class="font-heavy text-[13px] tracking-widest text-white/40 transition-all hover:text-white relative group">入群通道<span class="absolute -bottom-1 left-0 w-0 h-[2px] bg-[#5ed29c] transition-all group-hover:w-full"></span></a>
    </nav>
    <button id="mobile-menu-btn" class="lg:hidden p-2 text-[#5ed29c]"><i id="menu-icon" data-lucide="menu" class="w-8 h-8"></i></button>
  </header>

  <div id="mobile-menu" class="fixed inset-0 bg-[#010302]/95 backdrop-blur-2xl z-[60] transition-all duration-500 flex flex-col items-center justify-center gap-10 opacity-0 invisible">
    <a href="#" class="mobile-link font-heavy text-4xl font-extrabold tracking-tighter hover:text-[#5ed29c]">战略中心</a>
    <a href="#" class="mobile-link font-heavy text-4xl font-extrabold tracking-tighter hover:text-[#5ed29c]">实时战报</a>
    <a href="#" class="mobile-link font-heavy text-4xl font-extrabold tracking-tighter hover:text-[#5ed29c]">情报智库</a>
    <a href="#" class="mobile-link font-heavy text-4xl font-extrabold tracking-tighter hover:text-[#5ed29c]">入群通道</a>
  </div>

  <main class="relative z-20 flex flex-col lg:flex-row items-center justify-center lg:justify-between min-h-screen px-6 md:px-16 lg:px-32 pt-32 pb-20 gap-16 lg:gap-24">
    <div class="w-full lg:max-w-3xl order-2 lg:order-1">
      <p class="font-jakarta text-[12px] font-bold uppercase tracking-[0.5em] text-[#5ed29c] mb-8 flex items-center gap-4 justify-start">
        <span class="w-12 h-[2px] bg-[#5ed29c]"></span>Elite Tactical Network
      </p>
      <h1 class="font-heavy text-[48px] md:text-[80px] lg:text-[96px] leading-[1.1] tracking-tight uppercase mb-10 heavy-text-shadow">
        掌控加密<br />
        <span class="relative inline-block">
          <span class="absolute inset-0 text-[#5ed29c] blur-[20px] opacity-60 select-none">财富指挥权</span>
          <span class="absolute inset-0 text-transparent select-none" style="-webkit-text-stroke: 2px rgba(94, 210, 156, 0.6);">财富指挥权</span>
          <span class="relative text-transparent bg-clip-text bg-gradient-to-b from-white via-white/90 to-[#00f2ff]/40">财富指挥权</span>
        </span>
        <span class="text-[#5ed29c]">.</span>
      </h1>
      <p class="font-inter text-[16px] md:text-[18px] text-white/50 max-w-[620px] leading-relaxed mb-12 border-l-4 border-[#5ed29c] pl-8">
        在混沌的市场中寻找确定性。比特司令集结链上监控、大宗追踪与宏观模型，为精英交易者提供最稳重的决策支持。
      </p>

      <a href="https://t.me/btcgeneral" target="_blank" rel="noopener noreferrer" class="inline-flex group relative overflow-hidden bg-[#5ed29c] text-[#010302] font-heavy text-[16px] md:text-[18px] uppercase tracking-widest px-12 md:px-14 py-5 md:py-6 rounded-2xl transition-all hover:scale-[1.02] active:scale-95 shadow-[0_0_30px_rgba(94,210,156,0.3)] cursor-pointer">
        <span class="relative z-10 flex items-center gap-4">加入行情分析群<i data-lucide="arrow-right" class="w-6 h-6 group-hover:translate-x-3 transition-transform stroke-[3px]"></i></span>
        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
      </a>
    </div>

    <div class="w-full lg:w-auto flex justify-center lg:justify-end order-1 lg:order-2">
      <div class="w-[300px] md:w-[320px] rounded-[2.5rem] liquid-glass p-10 flex flex-col justify-between group overflow-hidden border border-white/5 lg:translate-y-0 translate-y-6">
        <div class="scanline"></div>
        <div class="flex justify-between items-start relative z-10">
          <div class="flex flex-col">
            <span class="font-heavy text-[10px] text-[#5ed29c] tracking-[0.3em] uppercase">COMMANDER ALPHA</span>
            <span class="font-inter text-[9px] text-white/30 uppercase mt-1">Status: Commanding</span>
          </div>
          <div class="w-2.5 h-2.5 rounded-full bg-[#5ed29c] shadow-[0_0_10px_#5ed29c] animate-pulse"></div>
        </div>
        <div class="relative z-10 mt-12">
          <h3 class="font-inter text-[20px] md:text-[22px] leading-[1.3] font-bold mb-6">
            跟随 <span class="font-heavy text-[28px] md:text-[32px] text-[#00f2ff] tracking-tight block my-2 drop-shadow-sm">比特司令</span> 指挥资金突围
          </h3>
          <div class="space-y-3">
            <div class="flex items-center gap-3 py-2 px-3 bg-white/5 rounded-lg border border-white/5"><i data-lucide="check-circle" class="w-3.5 h-3.5 text-[#5ed29c]"></i><span class="text-[11px] text-white/60 font-bold uppercase tracking-wider">Institutional Insights</span></div>
            <div class="flex items-center gap-3 py-2 px-3 bg-white/5 rounded-lg border border-white/5"><i data-lucide="check-circle" class="w-3.5 h-3.5 text-[#5ed29c]"></i><span class="text-[11px] text-white/60 font-bold uppercase tracking-wider">Real-time Signals</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();
    const menuBtn = document.getElementById('mobile-menu-btn'), mobileMenu = document.getElementById('mobile-menu'), menuIcon = document.getElementById('menu-icon'), mobileLinks = document.querySelectorAll('.mobile-link');
    let isMenuOpen = false;
    function toggleMenu() {
      isMenuOpen = !isMenuOpen;
      if (isMenuOpen) { mobileMenu.classList.replace('opacity-0', 'opacity-100'); mobileMenu.classList.replace('invisible', 'visible'); menuIcon.setAttribute('data-lucide', 'x'); } 
      else { mobileMenu.classList.replace('opacity-100', 'opacity-0'); mobileMenu.classList.replace('visible', 'invisible'); menuIcon.setAttribute('data-lucide', 'menu'); }
      lucide.createIcons();
    }
    menuBtn.addEventListener('click', toggleMenu);
    mobileLinks.forEach(link => link.addEventListener('click', () => { if (isMenuOpen) toggleMenu(); }));

    const video = document.getElementById('bg-video');
    const hlsUrl = "https://stream.mux.com/tLkHO1qZoaaQOUeVWo8hEBeGQfySP02EPS02BmnNFyXys.m3u8";
    if (Hls.isSupported()) {
      const hls = new Hls({ enableWorker: false });
      hls.loadSource(hlsUrl); hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => console.log("自动播放被限制", e)));
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = hlsUrl; video.addEventListener('loadedmetadata', () => video.play());
    }
  </script>
</body>
</html>
